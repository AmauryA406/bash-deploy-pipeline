<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyApp</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #00ff88;
      --accent-dim: rgba(0, 255, 136, 0.08);
      --text: #e2e2f0;
      --text-muted: #6b6b8a;
      --mono: 'Space Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .container {
      text-align: center;
      padding: 3rem;
      position: relative;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.25rem 0.75rem;
      border-radius: 2px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      background: var(--accent-dim);
    }

    h1 {
      font-family: var(--mono);
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 1rem;
      color: #fff;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.05em;
      margin-bottom: 3rem;
    }

    .meta {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .meta-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.75rem 1.5rem;
      font-family: var(--mono);
      font-size: 0.8rem;
    }

    .meta-item .label {
      color: var(--text-muted);
      display: block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }

    .meta-item .value {
      color: var(--accent);
    }

    /* STATUS indicator */
    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 2.5rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,255,136,0.4); }
      50%       { opacity: 0.7; box-shadow: 0 0 0 6px rgba(0,255,136,0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="badge">● PIPELINE DEMO</div>

    <h1>My<span>App</span></h1>
    <p class="subtitle">Static web application — bash deploy pipeline</p>

    <div class="meta">
      <!-- VERSION : ne pas supprimer ce commentaire, il est vérifié par test.sh -->
      <div class="meta-item">
        <span class="label">Version</span>
        <span class="value" id="version">v1.0.0</span>
      </div>
      <div class="meta-item">
        <span class="label">Environment</span>
        <span class="value" id="env">local</span>
      </div>
      <div class="meta-item">
        <span class="label">Deployed at</span>
        <span class="value" id="date">--</span>
      </div>
    </div>

    <div class="status">
      <div class="dot"></div>
      <span>RUNNING</span>
    </div>
  </div>

  <script>
    // Affiche la date de déploiement
    document.getElementById('date').textContent = new Date().toLocaleDateString('fr-FR');
  </script>

</body>
</html>
